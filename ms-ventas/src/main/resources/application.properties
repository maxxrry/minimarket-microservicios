# ============================================
# CONFIGURACIï¿½N DEL MICROSERVICIO
# ============================================
spring.application.name=ms-ventas
server.port=8087

# ============================================
# CONFIGURACIï¿½N DE BASE DE DATOS - MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/mm_ventas?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# CONFIGURACIï¿½N DE JPA + HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# CONFIGURACIï¿½N DE LOGS
# ============================================
logging.level.com.minimarket.msventas=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.minimarket.msventas.client=DEBUG

# ============================================
# URLs DE MICROSERVICIOS (Feign Clients)
# ============================================
ms-catalogo.url=http://localhost:8081
ms-inventario.url=http://localhost:8084
ms-clientes.url=http://localhost:8085
ms-empleados.url=http://localhost:8086
ms-promociones.url=http://localhost:8089

# ============================================
# TIMEOUTS DE FEIGN
# ============================================
spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=5000
spring.cloud.openfeign.client.config.default.logger-level=BASIC