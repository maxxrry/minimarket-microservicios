# ============================================
# CONFIGURACIÓN DEL MICROSERVICIO
# ============================================
spring.application.name=ms-clientes
server.port=8085

# ============================================
# CONFIGURACIÓN DE BASE DE DATOS - MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/mm_clientes?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# CONFIGURACIÓN DE JPA + HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# CONFIGURACIÓN DE LOGS
# ============================================
logging.level.com.minimarket.msclientes=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG