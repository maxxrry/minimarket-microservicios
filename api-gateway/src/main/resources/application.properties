# ============================================
# CONFIGURACIÓN DEL API GATEWAY
# ============================================
spring.application.name=api-gateway
server.port=8080

# ============================================
# RUTAS A LOS MICROSERVICIOS
# ============================================

# -------------------- ms-catalogo (8081) --------------------
spring.cloud.gateway.routes[0].id=ms-catalogo
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/productos/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/productos/(?<segment>.*), /api/productos/${segment}

spring.cloud.gateway.routes[1].id=ms-catalogo-swagger
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/swagger-ui/**, /api-docs/**

# -------------------- ms-categorias (8082) --------------------
