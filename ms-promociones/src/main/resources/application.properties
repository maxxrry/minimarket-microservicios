# ============================================
# CONFIGURACION DEL MICROSERVICIO
# ============================================
spring.application.name=ms-promociones
server.port=8089

# ============================================
# CONFIGURACION DE BASE DE DATOS - MySQL
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/mm_promociones?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# CONFIGURACION DE JPA + HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# CONFIGURACION DE LOGS
# ============================================
logging.level.com.minimarket.mspromociones=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
